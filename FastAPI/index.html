<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Robot Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #e63946; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #d62828; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; padding: 10px; border-radius: 4px; display: none; }
        .survives { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .destroyed { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Arena Predictor</h2>
        <form id="botForm">
            <label for="botName">Robot Name</label>
            <input type="text" id="botName" value="Angad" required>

            <label for="weapon">Weapon Power (1-10)</label>
            <input type="number" id="weapon" min="1" max="10" value="9" required>

            <label for="armor">Armor Thickness (1-10)</label>
            <input type="number" id="armor" min="1" max="10" value="3" required>

            <button type="submit">Run Simulation</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        // Listen for the form submission
        document.getElementById('botForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent page from refreshing

            // Get the values from the inputs
            const name = document.getElementById('botName').value;
            const weapon = parseInt(document.getElementById('weapon').value);
            const armor = parseInt(document.getElementById('armor').value);

            // Prepare the JSON payload
            const payload = {
                bot_name: name,
                weapon_power: weapon,
                armor: armor
            };

            try {
                // Send a POST request to our FastAPI server
                const response = await fetch('http://127.0.0.1:8000/predict_survival', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Display the result
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `${data.robot} is predicted to be: <strong>${data.prediction}</strong>`;
                
                // Change color based on outcome
                if (data.prediction === "Survives") {
                    resultDiv.className = 'survives';
                } else {
                    resultDiv.className = 'destroyed';
                }

            } catch (error) {
                console.error('Error:', error);
                alert("Failed to connect to the API. Is your FastAPI server running?");
            }
        });
    </script>

</body>
</html>
